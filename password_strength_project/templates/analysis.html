<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Analysis - Password Strength Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-shield-alt"></i> Password Strength Analyzer
            </a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-lg-10 mx-auto">
                <div class="text-center mb-5">
                    <h1 class="display-4 mb-3">Batch Password Analysis</h1>
                    <p class="lead">Analyze multiple passwords at once</p>
                </div>

                <!-- Batch Input Card -->
                <div class="card shadow-lg mb-4">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="fas fa-list"></i> Password Input</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="passwordList" class="form-label">Enter passwords (one per line):</label>
                            <textarea class="form-control" id="passwordList" rows="8" 
                                      placeholder="Enter each password on a new line&#10;Example:&#10;password123&#10;SecureP@ss1&#10;VeryStrongP@ssw0rd!"></textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-success" id="analyzeBatchBtn">
                                <i class="fas fa-play"></i> Analyze Passwords
                            </button>
                            <button class="btn btn-outline-secondary" id="clearBtn">
                                <i class="fas fa-broom"></i> Clear
                            </button>
                            <button class="btn btn-outline-info" id="sampleBtn">
                                <i class="fas fa-vial"></i> Load Sample
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Results Table -->
                <div class="card shadow-lg d-none" id="resultsCard">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0"><i class="fas fa-table"></i> Analysis Results</h4>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover" id="resultsTable">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Password</th>
                                        <th>Strength</th>
                                        <th>Confidence</th>
                                        <th>Length</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Results will be populated here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-light mt-5 py-4">
        <div class="container text-center">
            <p>&copy; 2024 Password Strength Analyzer. Machine Learning Project.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/analysis.js') }}"></script>
</body>
</html>
